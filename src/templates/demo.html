<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Printer - 本地自动打印工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <main class="card">
        <div class="header">
            <div class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 6 2 18 2 18 9"></polyline>
                    <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                    <rect x="6" y="14" width="12" height="8"></rect>
                </svg>
            </div>
            <div>
                <h1>Auto Printer</h1>
                <p class="subtitle">上传 PDF，自动调用本地默认打印机静默打印</p>
            </div>
        </div>

        <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" accept="application/pdf" hidden>
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <p class="drop-text"><strong>点击选择</strong> 或拖拽 PDF 到此处</p>
            <p class="drop-hint">仅支持 PDF 文件，最大 50MB</p>
        </div>

        <div class="file-info" id="fileInfo" style="display: none;">
            <div class="file-meta">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                <div>
                    <p class="file-name" id="fileName"></p>
                    <p class="file-size" id="fileSize"></p>
                </div>
            </div>
            <button class="icon-btn" id="clearBtn" title="清空">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <button class="print-btn" id="printBtn" disabled>
            <span class="btn-text">开始打印</span>
            <span class="spinner" style="display: none;"></span>
        </button>

        <div class="status-panel" id="statusPanel">
            <div class="status-content" id="statusContent"></div>
        </div>

        <div class="footer">
            <span id="serviceStatus" class="service-badge">检查服务中...</span>
            <a href="/api/status" target="_blank">API 状态</a>
        </div>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
