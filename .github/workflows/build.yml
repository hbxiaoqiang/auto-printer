name: Build Release

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller auto-printer.spec --clean --noconfirm || true

      - name: Upload PyInstaller logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-macos-logs
          path: build/**/*.txt

      - name: Zip .app bundle
        if: success()
        run: |
          cd dist
          zip -r AutoPrinter-macOS.zip AutoPrinter.app

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AutoPrinter-macOS
          path: dist/AutoPrinter-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller auto-printer.spec --clean --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoPrinter-Windows
          path: dist/auto-printer.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/AutoPrinter-macOS/AutoPrinter-macOS.zip
            artifacts/AutoPrinter-Windows/auto-printer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
